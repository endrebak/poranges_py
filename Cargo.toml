[package]
name = "poranges-python"
version = "0.1.0"
edition = "2021"

[lib]
name = "_poranges"
crate-type = ["cdylib"]

[dependencies]
poranges = { path = "../poranges" }
pyo3 = { version = "0.27.0", features = ["extension-module"] }
pyo3-polars = { version = "0.26.0", features = ["dtype-categorical"] }
